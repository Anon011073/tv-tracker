<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <title>TV Tracker - Home</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body id="top">
<nav class="container-fluid">
  <ul>
    <li><a href="./" class="brand">📺 TV Tracker</a></li>
  </ul>
  <input type="search" id="searchInput" name="search" placeholder="Search">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="watchlist.html">Profile</a></li>
    <li><a href="watchlist.html">Watchlist</a></li>
    <li><a href="calendar.html">Calendar</a></li>
  </ul>
</nav>
  <main class="container">
    <section id="searchSection" style="display: none;">
      <h2>🔍 Search Results</h2>
      <div class="grid" id="searchResults"></div>
    </section>

    <section id="movieSection" style="display: none;">
      <h2>🎬 Movie Results</h2>
      <div class="grid" id="movieResults"></div>
    </section>

    <section>
      <h2>🎯 Shows I Watch</h2>
      <div class="grid" id="trackedShows"></div>
    </section>

    <section>
      <h2>🎯 Featured Genre</h2>
      <label for="genreSelect">Choose a genre:</label>
      <select id="genreSelect">
        <option value="80">Crime</option>
        <option value="9648">Mystery</option>
        <option value="10765">Sci-Fi & Fantasy</option>
        <option value="10759">Action & Adventure</option>
        <option value="35">Comedy</option>
        <option value="18">Drama</option>
        <option value="16">Animation</option>
        <option value="99">Documentary</option>
      </select>
      <div class="grid" id="genreSection"></div>
    </section>

    <section>
      <h2>📈 Trending Today</h2>
      <div class="grid" id="trending"></div>
    </section>

    <section>
      <h2>🔥 Popular Shows</h2>
      <div class="grid" id="popular"></div>
    </section>

    <section>
      <h2>🏆 Top Rated Shows</h2>
      <div class="grid" id="topRated"></div>
    </section>
  </main>
  <script src="js/main.js"></script>
  <footer class="site-footer">
    <p>© 2025 TV Tracker — Built with ❤️ for your watchlist.</p>
    <p>
      <a href="calendar.html">📅 Episode Calendar</a> |
      <a href="index.html">🏠 Back to Home</a>
    </p>
  </footer>
  <a href="#" id="back-to-top" class="back-to-top" style="display: none;">⬆</a>
</body>
</html>
