<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Profile</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav>
  <button id="themeToggle" class="theme-toggle">🌙 Toggle Theme</button>
  <a href="index.html">🏠 Home</a>
  <a href="calendar.html">📅 Calendar</a>
  <a href="profile.html">👤 Profile</a>
  <a href="watchlist.html">📋 Watchlist</a>
  <div id="user-nav"></div>
</nav>

<main>
  <h1 id="username"></h1>
  <h2>❤️ Your Favourites</h2>
  <div id="favouritesList" class="show-grid"></div>
</main>

<script src="js/main.js"></script>
<script src="js/theme.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    updateNav();

    const usernameEl = document.getElementById('username');
    const sessionResponse = await fetch('api/session.php');
    const sessionData = await sessionResponse.json();
    if (sessionData.loggedIn) {
      usernameEl.textContent = `Welcome, ${sessionData.username}!`;
    } else {
      window.location.href = 'login.html';
    }

    const container = document.getElementById('favouritesList');
    const favoritesResponse = await fetch('api/favorites.php?action=list');
    const favoritesData = await favoritesResponse.json();

    if (favoritesData.success) {
      if (favoritesData.favorites.length === 0) {
        container.innerHTML = '<p>No favourites yet!</p>';
      } else {
        favoritesData.favorites.forEach(fav => {
          const div = document.createElement('div');
          div.className = 'card';
          div.innerHTML = `
            <img src="https://image.tmdb.org/t/p/w200${fav.poster_path}" alt="${fav.title}" />
            <h3>${fav.title}</h3>
            <button onclick="removeFav(${fav.tmdb_id})">Remove</button>
            <button onclick="location.href='${fav.type}.html?id=${fav.tmdb_id}'">Details</button>
          `;
          container.appendChild(div);
        });
      }
    } else {
      container.innerHTML = `<p>Error: ${favoritesData.message}</p>`;
    }
  });

  async function removeFav(id) {
    const formData = new FormData();
    formData.append('action', 'remove');
    formData.append('tmdb_id', id);

    const response = await fetch('api/favorites.php', {
      method: 'POST',
      body: formData
    });

    const result = await response.json();
    alert(result.message);

    if (result.success) {
      location.reload();
    }
  }
</script>
<footer class="site-footer">
  <p>© 2025 TV Tracker — Built with ❤️ for your watchlist.</p>
</footer>
<a href="#" class="back-to-top" title="Back to Top">⬆️ Top</a>
</body>
</html>
