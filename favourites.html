<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Favourites</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav>
  <button id="themeToggle" class="theme-toggle">🌙 Toggle Theme</button>
  <a href="index.html">🏠 Home</a>
  <a href="calendar.html">📅 Calendar</a>
  <a href="favourites.html">⭐ Favourites</a>
  <a href="watchlist.html">📋 Watchlist</a>
  <div id="user-nav"></div>
</nav>
  <h1>❤️ Your Favourites</h1>
  <div id="favouritesList"></div>

  <script src="js/main.js"></script>
  <script src="js/theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      updateNav();
    });

    const container = document.getElementById('favouritesList');

    fetch('api/favorites.php?action=list')
      .then(res => {
        if (!res.ok) {
          throw new Error(`HTTP error! status: ${res.status}`);
        }
        return res.json();
      })
      .then(data => {
        if (data.success) {
          if (data.favorites.length === 0) {
            container.innerHTML = '<p>No favourites yet!</p>';
          } else {
            data.favorites.forEach(fav => {
              const div = document.createElement('div');
              div.className = 'fav-card';
              div.innerHTML = `
                <img src="https://image.tmdb.org/t/p/w200${fav.poster_path}" alt="${fav.title}" />
                <h3>${fav.title}</h3>
                <button onclick="removeFav(${fav.tmdb_id})">Remove</button>
                <button onclick="location.href='${fav.type}.html?id=${fav.tmdb_id}'">Details</button>
              `;
              container.appendChild(div);
            });
          }
        } else {
          container.innerHTML = `<p>Error: ${data.message}</p>`;
        }
      })
      .catch(error => {
        console.error('Error fetching favorites:', error);
        container.innerHTML = `<p>An error occurred: ${error.message}</p>`;
      });

    async function removeFav(id) {
      try {
        const formData = new FormData();
        formData.append('action', 'remove');
        formData.append('tmdb_id', id);

        const response = await fetch('api/favorites.php', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        alert(result.message);

        if (result.success) {
          location.reload();
        }
      } catch (error) {
        console.error('Error removing favorite:', error);
        alert('An error occurred. Please try again.');
      }
    }
  </script>

</html>
