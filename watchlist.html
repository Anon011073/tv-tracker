<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Watchlist</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav>
  <button id="themeToggle" class="theme-toggle">🌙 Toggle Theme</button>
  <a href="index.html">🏠 Home</a>
  <a href="calendar.html">📅 Calendar</a>
  <a href="profile.html">👤 Profile</a>
  <a href="watchlist.html">📋 Watchlist</a>
  <div id="user-nav"></div>
</nav>

  <h1>📋 Unwatched Episodes</h1>
  <div id="watchList"></div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('watchList');
      try {
        const favoritesResponse = await fetch('api/favorites.php?action=list');
        if (!favoritesResponse.ok) {
          throw new Error(`HTTP error! status: ${favoritesResponse.status}`);
        }
        const favoritesData = await favoritesResponse.json();

        if (!favoritesData.success) {
          container.innerHTML = `<p>Error: ${favoritesData.message}</p>`;
          return;
        }

        if (favoritesData.favorites.length === 0) {
          container.innerHTML = '<p>No favourites added.</p>';
          return;
        }

        for (const fav of favoritesData.favorites) {
          if (fav.type !== 'tv') continue;

          const [showResponse, historyResponse] = await Promise.all([
            fetch(`api/tmdb.php?endpoint=/tv/${fav.tmdb_id}`),
            fetch(`api/watch_history.php?action=get&tmdb_id=${fav.tmdb_id}`)
          ]);

          if (!showResponse.ok || !historyResponse.ok) {
            throw new Error('Failed to fetch show or history data.');
          }

          const show = await showResponse.json();
          const historyData = await historyResponse.json();
          const watchedEpisodes = new Set(historyData.history.map(h => `${h.season}-${h.episode}`));

          let unwatched = [];
          for (let s = 1; s <= show.number_of_seasons; s++) {
            const seasonResponse = await fetch(`api/tmdb.php?endpoint=/tv/${fav.tmdb_id}/season/${s}`);
            if (!seasonResponse.ok) {
              console.error(`Failed to fetch season ${s} for show ${fav.tmdb_id}`);
              continue;
            }
            const seasonData = await seasonResponse.json();
            seasonData.episodes.forEach(ep => {
              if (!watchedEpisodes.has(`${s}-${ep.episode_number}`)) {
                unwatched.push(`S${s}E${ep.episode_number} - ${ep.name}`);
              }
            });
          }

          if (unwatched.length > 0) {
            const div = document.createElement('div');
            const bodyId = `body-${show.id}`;
            div.innerHTML = `
              <h3 onclick="toggleWatchlist('${bodyId}')">▶ ${show.name} (click to expand)</h3>
              <div class="watchlist-body" id="${bodyId}" style="display:none;">
                <ul>${unwatched.map(e => `<li>${e}</li>`).join('')}</ul>
                <a href="show.html?id=${show.id}">▶ Go to show</a>
              </div>
            `;
            container.appendChild(div);
          }
        }
      } catch (error) {
        console.error('Error fetching watchlist:', error);
        container.innerHTML = `<p>An error occurred: ${error.message}</p>`;
      }
    });
  </script>
  <script>
  function toggleWatchlist(id) {
    const el = document.getElementById(id);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
  }
</script>
<script src="js/main.js"></script>
<script src="js/theme.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    updateNav();
  });
</script>

</body>
</html>
